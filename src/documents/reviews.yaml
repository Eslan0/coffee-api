openapi: 3.0.0
info:
  title: Coffee API
  version: 2.0.4

paths:
  /products/{id}/reviews:
    post:
      summary: Create a review for a product
      tags: [Reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rating:
                  type: integer
                comment:
                  type: string
      responses:
        "201":
          description: Review created
    get:
      summary: Get reviews for a product
      tags: [Reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of reviews

  /reviews/{id}:
    put:
      summary: Update a review
      tags: [Reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Review updated
    delete:
      summary: Delete a review
      tags: [Reviews]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Review deleted
